<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Travel Planner</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- Modal Create Trip -->
<div id="create-trip-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2>Plan New Trip</h2>
        <form id="create-trip-form">
            <div class="form-group">
                <label>Trip Title </label>
                <input type="text" id="trip-title-input" required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Start Date</label>
                    <input type="date" id="trip-start" required>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label>End Date</label>
                    <input type="date" id="trip-end" required>
                </div>
            </div>

            <div class="form-group">
                <label>Estimated Budget</label>
                <input type="number" id="trip-budget" min="1" required>
            </div>

            <div class="form-group">
                <label>Main Currency</label>
                <select id="trip-currency">
                    <option value="EUR">EUR (€)</option>
                    <option value="USD">USD ($)</option>
                    <option value="UAH">UAH (₴)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cover Image URL (Optional)</label>
                <input type="url" id="trip-image" placeholder="https://unsplash.com/...">
            </div>

            <div class="modal-actions">
                <button type="button" id="close-modal-btn" class="btn">Cancel</button>
                <button type="submit" class="btn btn-success">Create & Lock Currency</button>
            </div>
        </form>
    </div>
</div>

<body>

    <!-- NAVIGATION -->
    <nav style="padding: 15px; display: flex; gap: 10px; justify-content: center;">
        <a href="index.html">
            <button class="btn">Page 1</button>
        </a>

        <a href="page2.html">
            <button class="btn">Page 2</button>
        </a>

        <a href="page3.html">
            <button class="btn">Page 3</button>
        </a>
    </nav>

    <header>
        <h1>Travel Planner!</h1>
        <button id="logout-btn" class="btn hidden">Logout</button>
    </header>

    <main>
        <section id="auth-section" class="center-content">
            <h2>Welcome to your journey</h2>
            <button id="login-btn" class="btn btn-primary">
                Sign in with Google
            </button>
        </section>

        <section id="dashboard-section" class="hidden">
            <div class="dashboard-header">
                <h2>Active Trips</h2>
                <button id="add-trip-btn" class="btn btn-success">
                    + New Trip
                </button>
            </div>

            <div id="trips-container" class="grid-container">
                <!-- Trip cards will be injected here via app.js -->
            </div>
        </section>

        <table border="1">
    <tr>
        <th>Ім’я</th>
        <th>Вік</th>
    </tr>
    
    <tr>
        <td>Анна</td>
        <td>20</td>
    </tr>
    
    <tr>
        <td>Олег</td>
        <td>22</td>
    </tr>
</table>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
